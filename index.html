<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyan | プライベートエステサロン</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ヘッダーを左右に振り分ける設定 */
        header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            /* ここで左右端に配置しています */
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: #333;
        }

        /* メニュー（nav）の設定 */
        nav {
            display: block !important;
        }

        nav ul {
            display: flex !important;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px; /* メニュー同士の間隔 */
        }

        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* スマホで見た時の微調整 */
        @media (max-width: 480px) {
            nav ul {
                gap: 12px; /* スマホでは間隔を少し狭く */
            }
            nav ul li a {
                font-size: 0.85rem;
            }
            .logo {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">Abyan</a>
            <nav>
                <ul>
                    <li><a href="index.html">Top</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="access.html">Access</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero" style="height: 60vh; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?auto=format&fit=crop&q=80&w=1000') no-repeat center center/cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center;">
        <div class="hero-content">
            <h1 style="font-size: 2.2rem;">5年後も、今より輝く自分へ</h1>
            <p>Abyan | 大人女性のための肌質改善プライベートサロン</p>
            <a href="https://lin.ee/RJEkskt" class="cta-button">ご予約・お問い合わせ</a>
        </div>
    </section>

    <section id="about">
        <div class="container">
            <div class="section-title"><h2>Concept</h2></div>
            <p style="text-align: center;">店名の「Abyan」には、本来の美しさを引き出し、<br>より鮮やかに輝く日々をサポートしたいという想いを込めています。</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Abyan. All rights reserved.</p>
    </footer>
</body>
</html>
